<main>
   <h2>Admission Form</h2>
<form>
<label for="fullname">Full Name: </label><br>
<input type="text" id="fullname" placeholder="Enter your full name"> <br><br>
<label for="dob">Date Of Birth:</label><br>
<input type="date" id="dob"><br><br>
<label for="gender">Gender:</label><br>
<input type="radio" name="Gender">Female
<input type="radio" name="Gender">Male <br><br>
<label for="Class">Class Applying for</label> <br>
<select id="class">
<option>S.1</option>
<option>S.2</option>
<option>S.3</option>
<option>S.4</option>
<option>S.5</option>
<option>S.6</option>
</select>
<br><br>
<label for="parent">Parent/Guardian Name:</label> <br>
<input type="text" id="parent"><br><br>
<label for="phone ">Phone Number:</label><br>
<input type="tel" id="phone"><br><br>
<label for="email">Email:</label><br>
<input type="email" id="email"><br><br>
<input type="submit" value="Submit Application">
</form>
